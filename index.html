<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ambient Drone Generator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <canvas id="visualizer" aria-hidden="true"></canvas>

  <main class="app mode-create">

    <!-- Mode selector (hidden, kept for JS compatibility) -->
    <div class="mode-selector" role="tablist" aria-label="Mode selection" hidden>
      <button role="tab" id="tab-easy" aria-selected="false" aria-controls="panel-easy" class="mode-tab">Easy</button>
      <button role="tab" id="tab-create" aria-selected="true" aria-controls="panel-create" class="mode-tab active">Create</button>
    </div>

    <!-- Easy mode panel (hidden, kept for JS compatibility) -->
    <section id="panel-easy" role="tabpanel" aria-labelledby="tab-easy" class="mode-panel" hidden>
      <div class="mood-control">
        <div class="mood-header">
          <span class="mood-label-left">Dark</span>
          <span class="mood-title">Mood</span>
          <span class="mood-label-right">Bright</span>
        </div>
        <input type="range" id="mood-slider" class="mood-slider" min="0" max="100" value="50">
        <p class="mood-description" id="mood-description">Balanced warmth with gentle movement</p>
      </div>
      <button id="generate-btn" class="generate-btn">Generate New Drone</button>
    </section>

    <!-- Create mode panel -->
    <section id="panel-create" role="tabpanel" aria-labelledby="tab-create" class="mode-panel active">
      <div class="rack">

        <!-- Row 1: Header + Effects -->
        <div class="rack__top">
          <header class="header">
            <button id="play-btn" class="play-btn" aria-label="Play drone">
              <span class="toggle-on-ind">I</span>
              <span class="toggle-id">
                <svg class="play-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <polygon points="6,4 20,12 6,20" fill="currentColor"/>
                </svg>
                <svg class="pause-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <rect x="5" y="4" width="5" height="16" rx="1" fill="currentColor"/>
                  <rect x="14" y="4" width="5" height="16" rx="1" fill="currentColor"/>
                </svg>
              </span>
              <span class="toggle-off-ind">O</span>
            </button>
            <div class="header-text">
              <h1>a_d_gen_01</h1>
              <p class="tagline">ambient drone · generator</p>
            </div>
          </header>

          <section class="panel panel--effects">
            <span class="panel__label">Effects</span>

            <div class="effects-row">
              <!-- Modulation -->
              <div class="control-stage">
                <button class="bypass-toggle active" data-bypass="modulation" aria-pressed="false" aria-label="Bypass modulation">
                  <span class="toggle-on">ON</span>
                  <span class="toggle-off">OFF</span>
                </button>
                <input type="range" id="movement" class="control-slider" data-fader data-fader-label="MOD" min="0" max="100" value="56">
              </div>

              <!-- Saturation -->
              <div class="control-stage">
                <button class="bypass-toggle active" data-bypass="grit" aria-pressed="false" aria-label="Bypass saturation">
                  <span class="toggle-on">ON</span>
                  <span class="toggle-off">OFF</span>
                </button>
                <input type="range" id="grit" class="control-slider" data-fader data-fader-label="GRIT" min="0" max="100" value="24">
              </div>

              <!-- Delay -->
              <div class="control-stage bypassed">
                <button class="bypass-toggle" data-bypass="delay" aria-pressed="false" aria-label="Bypass delay">
                  <span class="toggle-on">ON</span>
                  <span class="toggle-off">OFF</span>
                </button>
                <input type="range" id="depth" class="control-slider" data-fader data-fader-label="DLAY" min="0" max="100" value="40">
              </div>

              <!-- Reverb -->
              <div class="control-stage">
                <button class="bypass-toggle active" data-bypass="reverb" aria-pressed="false" aria-label="Bypass reverb">
                  <span class="toggle-on">ON</span>
                  <span class="toggle-off">OFF</span>
                </button>
                <input type="range" id="space" class="control-slider" data-fader data-fader-label="RVRB" data-fader-format="time" min="0" max="60" step="1" value="60">
                <output for="space" class="sr-only" id="space-value">60s</output>
              </div>
            </div>
          </section>
        </div>

        <!-- Row 2: Chord Layers side by side -->
        <div class="rack__layers">

          <!-- Chord Layer 1 -->
          <section class="panel panel--layer layer" data-layer="0">
            <div class="layer-header">
              <div class="layer-controls">
                <select class="layer-chord" data-layer="0">
                  <option value="">Select sound...</option>
                  <option value="Cmaj7">C Major 7</option>
                  <option value="Am7">A Minor 7</option>
                  <option value="Fmaj7">F Major 7</option>
                  <option value="Dm7">D Minor 7</option>
                  <option value="G7">G Dominant 7</option>
                  <option value="Em7">E Minor 7</option>
                  <option value="Bbmaj7">Bb Major 7</option>
                  <option value="Csus2">C Sus 2</option>
                  <option value="Fsus2">F Sus 2</option>
                  <option value="Asus2">A Sus 2</option>
                  <option value="upload">Upload file...</option>
                </select>
                <input type="file" class="layer-upload" data-layer="0" accept="audio/*" hidden>
              </div>
              <button class="layer-toggle" data-layer="0" aria-label="Toggle layer 1">
                <span class="toggle-on-ind">I</span>
                <span class="toggle-id">C1</span>
                <span class="toggle-off-ind">O</span>
              </button>
              <!-- Keep in DOM for JS -->
              <span class="layer-name" id="layer-0-name" hidden>Empty</span>
              <button class="layer-clear" data-layer="0" aria-label="Clear layer 1" hidden>&times;</button>
            </div>

            <div class="fader-row">
              <input type="range" id="layer-0-vol" class="layer-vol-slider" data-layer="0" data-fader data-fader-label="VOL" min="0" max="100" value="80">
              <input type="range" id="layer-0-filter" class="layer-filter-slider" data-layer="0" data-fader data-fader-label="TONE" min="0" max="100" value="8">
              <input type="range" id="layer-0-pitch" class="layer-pitch-slider" data-layer="0" data-fader data-fader-label="PTCH" data-fader-format="pitch" min="-24" max="24" value="0">
              <output class="sr-only" id="layer-0-pitch-value">0</output>
              <input type="range" id="layer-0-length" class="layer-length-slider" data-layer="0" data-fader data-fader-label="LGTH" data-fader-format="time" min="2" max="10" value="10">
              <output class="sr-only" id="layer-0-length-value">10s</output>
              <input type="range" id="layer-0-fade" class="layer-fade-slider" data-layer="0" data-fader data-fader-label="XFAD" data-fader-format="fade" min="0" max="2" step="0.1" value="2">
              <output class="sr-only" id="layer-0-fade-value">2.0s</output>
            </div>
          </section>

          <!-- Chord Layer 2 -->
          <section class="panel panel--layer layer" data-layer="1">
            <div class="layer-header">
              <div class="layer-controls">
                <select class="layer-chord" data-layer="1">
                  <option value="">Select sound...</option>
                  <option value="Cmaj7">C Major 7</option>
                  <option value="Am7">A Minor 7</option>
                  <option value="Fmaj7">F Major 7</option>
                  <option value="Dm7">D Minor 7</option>
                  <option value="G7">G Dominant 7</option>
                  <option value="Em7">E Minor 7</option>
                  <option value="Bbmaj7">Bb Major 7</option>
                  <option value="Csus2">C Sus 2</option>
                  <option value="Fsus2">F Sus 2</option>
                  <option value="Asus2">A Sus 2</option>
                  <option value="upload">Upload file...</option>
                </select>
                <input type="file" class="layer-upload" data-layer="1" accept="audio/*" hidden>
              </div>
              <button class="layer-toggle" data-layer="1" aria-label="Toggle layer 2">
                <span class="toggle-on-ind">I</span>
                <span class="toggle-id">C2</span>
                <span class="toggle-off-ind">O</span>
              </button>
              <!-- Keep in DOM for JS -->
              <span class="layer-name" id="layer-1-name" hidden>Empty</span>
              <button class="layer-clear" data-layer="1" aria-label="Clear layer 2" hidden>&times;</button>
            </div>

            <div class="fader-row">
              <input type="range" id="layer-1-vol" class="layer-vol-slider" data-layer="1" data-fader data-fader-label="VOL" min="0" max="100" value="80">
              <input type="range" id="layer-1-filter" class="layer-filter-slider" data-layer="1" data-fader data-fader-label="TONE" min="0" max="100" value="50">
              <input type="range" id="layer-1-pitch" class="layer-pitch-slider" data-layer="1" data-fader data-fader-label="PTCH" data-fader-format="pitch" min="-24" max="24" value="0">
              <output class="sr-only" id="layer-1-pitch-value">0</output>
              <input type="range" id="layer-1-length" class="layer-length-slider" data-layer="1" data-fader data-fader-label="LGTH" data-fader-format="time" min="2" max="10" value="6">
              <output class="sr-only" id="layer-1-length-value">6s</output>
              <input type="range" id="layer-1-fade" class="layer-fade-slider" data-layer="1" data-fader data-fader-label="XFAD" data-fader-format="fade" min="0" max="2" step="0.1" value="1">
              <output class="sr-only" id="layer-1-fade-value">1.0s</output>
            </div>
          </section>
        </div>

        <!-- Row 3: Sequencer (full width) -->
        <section class="panel panel--sequencer layer sequencer-layer" data-layer="2">
          <div class="sequencer-left">
            <div class="layer-header">
              <button class="layer-toggle" data-layer="2" aria-label="Toggle sequencer">
                <span class="toggle-on-ind">I</span>
                <span class="toggle-id">S1</span>
                <span class="toggle-off-ind">O</span>
              </button>
              <span class="layer-name" id="layer-2-name">Sequencer</span>
              <label class="quantize-toggle">
                <input type="checkbox" id="quantize-toggle" checked>
                <span class="toggle-label">Snap</span>
              </label>
              <button class="layer-clear" data-layer="2" aria-label="Clear sequencer" hidden>&times;</button>
            </div>

            <!-- Keep in DOM for JS status updates -->
            <div class="sequencer-options" hidden>
              <div class="sequencer-status">
                <span class="seq-status-text" id="seq-status">Play notes below to record</span>
              </div>
            </div>

            <div class="fader-row">
              <input type="range" id="layer-2-vol" class="layer-vol-slider" data-layer="2" data-fader data-fader-label="VOL" min="0" max="100" value="100">
              <input type="range" id="layer-2-filter" class="layer-filter-slider" data-layer="2" data-fader data-fader-label="TONE" min="0" max="100" value="33">
              <input type="range" id="layer-2-pitch" class="layer-pitch-slider" data-layer="2" data-fader data-fader-label="PTCH" data-fader-format="pitch" min="-24" max="24" value="-11">
              <output class="sr-only" id="layer-2-pitch-value">-11</output>
            </div>
          </div>

          <div class="sequencer-right">
            <div class="sequencer-grid" id="sequencer-grid">
              <div class="grid-playhead" id="grid-playhead"></div>
              <div class="grid-lines">
                <span class="grid-line beat"></span>  <!-- 1 -->
                <span class="grid-line"></span>        <!-- 2 -->
                <span class="grid-line"></span>        <!-- 3 -->
                <span class="grid-line beat"></span>  <!-- 4 -->
                <span class="grid-line"></span>        <!-- 5 -->
                <span class="grid-line"></span>        <!-- 6 -->
                <span class="grid-line"></span>        <!-- 7 -->
                <span class="grid-line beat"></span>  <!-- 8 -->
                <span class="grid-line"></span>        <!-- 9 -->
                <span class="grid-line"></span>        <!-- 10 -->
                <span class="grid-line"></span>        <!-- 11 -->
                <span class="grid-line beat"></span>  <!-- 12 -->
                <span class="grid-line"></span>        <!-- 13 -->
                <span class="grid-line"></span>        <!-- 14 -->
                <span class="grid-line"></span>        <!-- 15 -->
                <span class="grid-line"></span>        <!-- 16 -->
              </div>
              <div class="grid-notes" id="grid-notes"></div>
            </div>
            <div class="keyboard" id="keyboard">
              <div class="key white" data-note="C3" data-key="a">
                <span class="note-label">C</span>
              </div>
              <div class="key white" data-note="D3" data-key="s">
                <span class="note-label">D</span>
              </div>
              <div class="key white" data-note="E3" data-key="d">
                <span class="note-label">E</span>
              </div>
              <div class="key white" data-note="F3" data-key="f">
                <span class="note-label">F</span>
              </div>
              <div class="key white" data-note="G3" data-key="g">
                <span class="note-label">G</span>
              </div>
              <div class="key white" data-note="A3" data-key="h">
                <span class="note-label">A</span>
              </div>
              <div class="key white" data-note="B3" data-key="j">
                <span class="note-label">B</span>
              </div>
              <div class="key white" data-note="C4" data-key="k">
                <span class="note-label">C</span>
              </div>
              <div class="key black" data-note="C#3" data-key="w" style="left: 10.33%">
                <span class="note-label">#</span>
              </div>
              <div class="key black" data-note="D#3" data-key="e" style="left: 22.83%">
                <span class="note-label">#</span>
              </div>
              <div class="key black" data-note="F#3" data-key="t" style="left: 47.83%">
                <span class="note-label">#</span>
              </div>
              <div class="key black" data-note="G#3" data-key="y" style="left: 60.33%">
                <span class="note-label">#</span>
              </div>
              <div class="key black" data-note="A#3" data-key="u" style="left: 72.83%">
                <span class="note-label">#</span>
              </div>
            </div>
          </div>
        </section>

      </div>
    </section>

  </main>

  <script type="module" src="js/main.js"></script>
</body>
</html>
